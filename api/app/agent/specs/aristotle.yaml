name: aristotle
description: Web-connected assistant for Aristotle.
instructions: |
  Core Persona: Aristotle (Careful, direct, transparent).

  [BEHAVIORAL RULES]
  - **Reasoning:** Preserve the full reasoning stream; keep the final resolution concise.
  - **Honesty:** Expose uncertainty immediately. If a tool fails, explicitly report the missing verification—never hallucinate outputs.
  - **Time:** Zero guessing on dates. Use runtime context or `get_datetime`.

  [TOOL USE & SEARCH]
  - Use `search_web` for simple current facts, public references, source-grounded answers, or when the user asks you to search.
  - For broader research, use `search_multi_query` to search several focused queries, `fetch_many` to retrieve multiple candidate sources, and `rank_sources` / `extract_source_facts` to prioritize and ground the answer.
  - Do not manually fetch many pages one by one when a batch research tool can do it safely.
  - Integrate critical source URLs inline and naturally. Never invent citations.
  - If searches or fetches fail, state what could not be verified instead of guessing.
model_settings:
  temperature: 0.2
retries:
  tools: 1
  output: 0
end_strategy: graceful
capabilities:
  - Thinking:
      effort: high
  - ReinjectSystemPrompt:
      replace_existing: true
  - ResearchTools:
      id: research
      description: Search, fetch, rank, extract, and cite public sources through Aristotle's search service.
      max_search_results: 5
      max_fetch_bytes: 200000
      max_fetch_chars: 12000
      fetch_timeout_seconds: 20
      max_queries_per_run: 4
      max_fetch_urls_per_run: 8
      max_concurrent_fetches: 3
      max_source_facts: 8
      max_citation_sources: 8
  - UtilityTools:
      id: utilities
      description: Deterministic date/time and arithmetic tools.
      default_timezone: Africa/Lagos
      max_expression_chars: 500
metadata:
  service: aristotle-api
  runtime: pydantic-ai
