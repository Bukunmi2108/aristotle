use_default_settings:
  engines:
    remove:
      - ahmia
      - torch
      - brave

general:
  debug: false
  instance_name: "Aristotle Search"

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  bind_address: "127.0.0.1"
  port: 8080
  secret_key: "replace-this-with-env-later"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 12.0
  pool_connections: 20
  pool_maxsize: 20
