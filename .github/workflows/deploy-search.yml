name: Deploy Aristotle Search to VPS

on:
  push:
    branches:
      - main
    paths:
      - "search/**"
      - ".github/workflows/deploy-search.yml"
  workflow_dispatch:

concurrency:
  group: deploy-aristotle-search-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run search tests
        working-directory: search
        run: uv run --frozen python -m unittest discover -s tests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CONTABO_VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.CONTABO_VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy exact commit to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o BatchMode=yes -o ConnectTimeout=15 \
            "${{ secrets.CONTABO_VPS_USER }}@${{ secrets.CONTABO_VPS_HOST }}" \
            "/opt/workspace/apps/aristotle-search/deploy ${{ github.sha }}"
