name: Deploy Aristotle Model to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "model/**"
      - ".github/workflows/deploy-model.yml"
  workflow_dispatch:

concurrency:
  group: deploy-aristotle-model-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub>=1.18.0"
      - name: Upload model folder to existing Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >-
          hf upload Bukunmi2108/aristotle-model model .
          --repo-type space
          --delete "*"
          --commit-message "Deploy ${GITHUB_SHA} from GitHub"
