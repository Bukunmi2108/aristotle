name: Deploy Aristotle Model to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "model/**"
      - ".github/workflows/deploy-model.yml"
  workflow_dispatch:

concurrency:
  group: deploy-aristotle-model-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub==1.23.0"
      - name: Upload model folder to existing Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >-
          python -c 'import os; from huggingface_hub import HfApi;
          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
          repo_id="Bukunmi2108/aristotle-model", repo_type="space",
          folder_path="model", delete_patterns="*",
          commit_message="Deploy " + os.environ["GITHUB_SHA"] + " from GitHub")'
